<svg width="500" height="120">
  <style>
    /* Define styles for the table */
    .table {
      font-family: Arial, sans-serif;
      border-collapse: collapse;
      width: 100%;
    }

    .table th, .table td {
      border: 1px solid #dddddd;
      text-align: left;
      padding: 10px;
    }

    .table tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    .table th {
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
    }

    .table td {
      font-size: 14px;
    }

    .content {
      padding: 10px;
    }

    .projects {
      font-weight: bold;
      font-size: 16px;
    }

    .header {
      font-size: 18px;
    }
  </style>

  <!-- Table content -->
  <rect x="10" y="10" width="480" height="100" fill="#fff" stroke="#000" />

  <!-- Table -->
  <g class="table">
    <!-- First Column -->
    <g class="content">
      <text x="20" y="30" class="header">Projects I am part of</text>
      <text x="20" y="60" class="projects">Project 1</text>
      <text x="20" y="80" class="projects">Project 2</text>
    </g>

    <!-- Second Column -->
    <g class="content">
      <text x="180" y="30" class="header">Projects Demonstration</text>
      <text x="180" y="60">-</text>
      <text x="180" y="80">-</text>
    </g>

    <!-- Third Column -->
    <g class="content">
      <text x="340" y="30" class="header">Selected Publications and Articles</text>
    </g>

    <!-- Fourth Column -->
    <g class="content">
      <text x="340" y="80" class="header">Hobbies</text>
    </g>
  </g>
</svg>
